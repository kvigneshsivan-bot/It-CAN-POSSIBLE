<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBoost Settings</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
padding:30px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#0A1F44;
margin-bottom:30px;
}

.setting-box{
margin-bottom:25px;
padding:20px;
background:#fafafa;
border-radius:12px;
border:1px solid #e5e5e5;
}

.setting-box h2{
color:#eaf206;
margin-bottom:15px;
}

.setting-box p{
margin:10px 0;
font-size:17px;
}

label{
display:block;
font-weight:bold;
margin-bottom:10px;
}

input[type="password"]{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:15px;
font-size:15px;
}

.switch{
position:relative;
display:inline-block;
width:60px;
height:34px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#ccc;
transition:.4s;
border-radius:34px;
}

.slider:before{
position:absolute;
content:"";
height:26px;
width:26px;
left:4px;
bottom:4px;
background:white;
transition:.4s;
border-radius:50%;
}

input:checked + .slider{
background:#eddd26;
}

input:checked + .slider:before{
transform:translateX(26px);
}

.btn{
width:100%;
padding:12px;
background:#cecf8b;
color:rgb(0, 0, 0);
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:.3s;
margin-top:10px;
}

.btn:hover{
background:#0A1F44;
}

.dark-mode{
background:#121212;
color:white;
}

.dark-mode .container{
background:#1e1e1e;
color:white;
}

.dark-mode .setting-box{
background:#2a2a2a;
border:1px solid #444;
}

.dark-mode input{
background:#333;
color:white;
border:1px solid #555;
}

.dark-mode h1{
color:#ffffff;
}

.dark-mode h2{
color:#cac00d;
}

</style>
</head>
<body>

<div class="container">

<h1>⚙ Settings</h1>

<div class="setting-box">

<h2>👤 Account</h2>

<p><strong>Name :</strong> <span id="userName"></span></p>

<p><strong>Email :</strong> <span id="userEmail"></span></p>

</div>

<div class="setting-box">

<label>🌙 Dark Mode</label>

<label class="switch">

<input type="checkbox" id="darkMode">

<span class="slider"></span>

</label>

</div>

<div class="setting-box">

<label>🔔 Notifications</label>

<label class="switch">

<input type="checkbox" id="notifications">

<span class="slider"></span>

</label>

</div>

<div class="setting-box">

<label>🔑 Change Password</label>

<input
type="password"
id="newPassword"
placeholder="Enter New Password">

<button class="btn" onclick="saveSettings()">
Save Password
</button>

</div>

<div class="setting-box">

<h2>📊 Statistics</h2>

<p>Completed Topics :
<b id="completedTopics">0</b></p>

<p>Certificates :
<b id="certificateCount">0</b></p>

<p>Overall Accuracy :
<b id="overallAccuracy">0%</b></p>

</div>

<div class="setting-box">

<button
class="btn"
onclick="resetProgress()">

🗑 Reset Progress

</button>

</div>

<div class="setting-box">

<button
class="btn"
onclick="logout()">

🚪 Logout

</button>

</div>

</div>

<script>

// ==========================
// Load User Details
// ==========================

const user =
JSON.parse(localStorage.getItem("brainboostUser")) || {};

document.getElementById("userName").innerText =
user.name || "Student";

document.getElementById("userEmail").innerText =
user.email || "No Email";

// ==========================
// Load Dark Mode
// ==========================

const darkMode =
localStorage.getItem("darkMode");

if(darkMode === "true"){

    document.body.classList.add("dark-mode");

    document.getElementById("darkMode").checked = true;

}

// ==========================
// Load Notifications
// ==========================

const notify =
localStorage.getItem("notifications");

if(notify === "true"){

    document.getElementById("notifications").checked = true;

}

// ==========================
// Dark Mode Toggle
// ==========================

document.getElementById("darkMode")
.addEventListener("change",function(){

    if(this.checked){

        document.body.classList.add("dark-mode");

    }else{

        document.body.classList.remove("dark-mode");

    }

});

// ==========================
// Statistics
// ==========================

const progress =
JSON.parse(localStorage.getItem("progress")) || {};

let completed = 0;
let totalAccuracy = 0;

for(let topic in progress){

    completed++;

    totalAccuracy += Number(progress[topic].accuracy);

}

document.getElementById("completedTopics").innerText =
completed + " / 24";

const certificates =
JSON.parse(localStorage.getItem("certificates")) || [];

document.getElementById("certificateCount").innerText =
certificates.length;

let avg = 0;

if(completed > 0){

    avg = Math.round(totalAccuracy/completed);

}

document.getElementById("overallAccuracy").innerText =
avg + "%";

// ==========================
// Save Settings
// ==========================

function saveSettings(){

    localStorage.setItem(
        "darkMode",
        document.getElementById("darkMode").checked
    );

    localStorage.setItem(
        "notifications",
        document.getElementById("notifications").checked
    );

    let user =
    JSON.parse(localStorage.getItem("brainboostUser")) || {};

    if(document.getElementById("newPassword").value){

        user.password =
        document.getElementById("newPassword").value;

        localStorage.setItem(
            "brainboostUser",
            JSON.stringify(user)
        );

    }

    alert("✅ Settings Saved Successfully");

}

// ==========================
// Reset Progress
// ==========================

function resetProgress(){

    if(confirm("Reset all your progress?")){

        localStorage.removeItem("progress");

        localStorage.removeItem("completedTopic");

        localStorage.removeItem("certificates");

        alert("Progress Reset Successfully");

        location.reload();

    }

}

// ==========================
// Logout
// ==========================

function logout(){

    localStorage.removeItem("loggedIn");

    alert("Logged Out Successfully");

    window.location.href="login.html";

}

</script>

<script src="js/app.js"></script>


</body>
</html>
