<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBoost Settings</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

h1{
color:#0A1F44;
margin-bottom:20px;
}

.setting-box{
margin-bottom:25px;
}

label{
display:block;
margin-bottom:10px;
font-weight:bold;
}

input[type="password"]{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
}

.switch{
position:relative;
display:inline-block;
width:60px;
height:34px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#ccc;
transition:.4s;
border-radius:34px;
}

.slider:before{
position:absolute;
content:"";
height:26px;
width:26px;
left:4px;
bottom:4px;
background:white;
transition:.4s;
border-radius:50%;
}

input:checked + .slider{
background:#FF6B00;
}

input:checked + .slider:before{
transform:translateX(26px);
}

.btn{
background:#FF6B00;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
}

.dark-mode{
background:#121212;
color:white;
}

</style>
</head>
<body>

<div class="container">

<h1>⚙ Settings</h1>

<div class="setting-box">
<label>Dark Mode</label>

<label class="switch">
<input type="checkbox" id="darkMode">
<span class="slider"></span>
</label>

</div>

<div class="setting-box">
<label>Notifications</label>

<label class="switch">
<input type="checkbox" id="notifications" checked>
<span class="slider"></span>
</label>

</div>

<div class="setting-box">

<label>Change Password</label>

<input
type="password"
id="newPassword"
placeholder="Enter New Password">

</div>

<button class="btn" onclick="saveSettings()">
Save Settings
</button>

</div>

<script>

const darkMode =
localStorage.getItem("darkMode");

if(darkMode==="true"){

document.body.classList.add("dark-mode");

document.getElementById("darkMode")
.checked=true;

}

document.getElementById("darkMode")
.addEventListener("change",function(){

if(this.checked){

document.body.classList.add("dark-mode");

}else{

document.body.classList.remove("dark-mode");

}

});

function saveSettings(){

localStorage.setItem(
"darkMode",
document.getElementById("darkMode").checked
);

localStorage.setItem(
"notifications",
document.getElementById("notifications").checked
);

let user =
JSON.parse(
localStorage.getItem("brainboostUser")
) || {};

if(document.getElementById("newPassword").value){

user.password =
document.getElementById("newPassword").value;

localStorage.setItem(
"brainboostUser",
JSON.stringify(user)
);

}

alert("✅ Settings Saved");

}

</script>

<script src="js/app.js"></script>


</body>
</html>
