<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBoost Admin Panel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
text-align:center;
color:#0A1F44;
margin-bottom:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:40px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

.card h2{
font-size:35px;
color:#FF6B00;
margin-bottom:10px;
}

.card p{
font-size:18px;
color:#444;
}

.table-box{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
margin-top:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#0A1F44;
color:white;
padding:15px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f3f3f3;
}

.logout{
margin-top:30px;
text-align:center;
}

button{
padding:12px 25px;
border:none;
background:#FF6B00;
color:white;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0A1F44;
}
/* ===========================
   Responsive Design
=========================== */

@media (max-width:768px){

body{

padding:15px;

}

.container{

width:100%;
padding:20px;

}

h1{

font-size:28px;
text-align:center;

}

.dashboard{

grid-template-columns:1fr;
gap:15px;

}

.card{

padding:18px;

}

.card h2{

font-size:28px;

}

table{

display:block;
overflow-x:auto;
white-space:nowrap;

}

th,
td{

padding:12px;
font-size:14px;

}

button{

padding:10px 14px;
font-size:14px;

}

}


</style>

</head>

<body>

<div class="container">

<h1>🧠 BrainBoost Admin Panel</h1>

<div class="cards">

<div class="card">
<h2 id="totalUsers">0</h2>
<p>Total Users</p>
</div>

<div class="card">
<h2 id="completedTopics">0</h2>
<p>Completed Topics</p>
</div>

<div class="card">
<h2 id="totalCertificates">0</h2>
<p>Certificates</p>
</div>

<div class="card">
<h2 id="bugReports">0</h2>
<p>Bug Reports</p>
</div>
<div class="card">
    <h2 id="todayLogins">0</h2>
    <p>Today's Logins</p>
</div>

<div class="card">
    <h2 id="quizAttempts">0</h2>
    <p>Quiz Attempts</p>
</div>

<div class="card">
    <h2 id="totalProgress">0</h2>
    <p>Progress Records</p>
</div>

<div class="card">
    <h2 id="bugReports">0</h2>
    <p>Bug Reports</p>
</div>

</div>

<div class="table-box">

<h2 style="margin-bottom:20px;">👥 Recent Users</h2>

<table>

<thead>

<tr>
<th>Name</th>
<th>Email</th>
</tr>

</thead>

<tbody id="usersTable">

</tbody>

</table>

</div>

<div class="table-box">

<h2 style="margin-bottom:20px;">
🐞 Bug Reports
</h2>

<table>

<thead>

<tr>

<th>User</th>
<th>Email</th>
<th>Issue</th>
<th>Status</th>
<th>Date</th>
<th>Action</th>

</tr>

</thead>

<tbody id="bugTable">

</tbody>

</table>

</div>

<div class="logout">

<button onclick="logout()">
Logout
</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>

<script>

// ==========================
// Admin Authentication
// ==========================

auth.onAuthStateChanged(function(user){

    if(!user){

        window.location.href="login.html";
        return;

    }

    if(user.email !== "k.vigneshsivan@gmail.com"){

        alert("Access Denied!");

        window.location.href="index.html";

        return;

    }

    loadAdminDashboard();

});



function loadAdminDashboard(){

    // ==========================
    // Users
    // ==========================

    db.collection("users")
    .get()
    .then((snapshot)=>{

        document.getElementById("totalUsers").innerText =
        snapshot.size;

        const tbody =
        document.getElementById("usersTable");

        tbody.innerHTML = "";

        snapshot.forEach((doc)=>{

            const data = doc.data();

            tbody.innerHTML += `
            <tr>
                <td>${data.name || "Student"}</td>
                <td>${data.email || ""}</td>
            </tr>
            `;

        });

    });


}
function markFixed(id){

    db.collection("bugReports")
    .doc(id)
    .update({

        status:"Fixed"

    })
    .then(()=>{

        alert("Bug marked as Fixed.");

        loadAdminDashboard();

    });

}

// ==========================
// Analytics
// ==========================

// Total Progress Records

db.collection("progress")
.get()
.then((snapshot)=>{

    document.getElementById("totalProgress").innerText =
    snapshot.size;

});

// Total Quiz Attempts

db.collection("quizState")
.get()
.then((snapshot)=>{

    document.getElementById("quizAttempts").innerText =
    snapshot.size;

});

// Total Users (Temporary)

db.collection("users")
.get()
.then((snapshot)=>{

    document.getElementById("todayLogins").innerText =
    snapshot.size;

});

function deleteBug(id){

    if(confirm("Delete this bug report?")){

        db.collection("bugReports")
        .doc(id)
        .delete()
        .then(()=>{

            alert("Bug Report Deleted.");

            loadAdminDashboard();

        });

    }
}

    // ==========================
    // Progress
    // ==========================

    db.collection("progress")
    .get()
    .then((snapshot)=>{

        let completedTopics = 0;
        let certificates = 0;

        snapshot.forEach((doc)=>{

            const progress = doc.data();

            for(let topic in progress){

                if(progress[topic].currentRound > 10){

                    completedTopics++;
                    certificates++;

                }

            }

        });

        document.getElementById("completedTopics").innerText =
        completedTopics;

        document.getElementById("totalCertificates").innerText =
        certificates;

    });


    // ==========================
    // Bug Reports
    // ==========================

    db.collection("bugReports")
    .get()
    .then((snapshot)=>{

        document.getElementById("bugReports").innerText =
        snapshot.size;

    })
    .catch(()=>{

        document.getElementById("bugReports").innerText = 0;

    });



// ==========================
// Load Bug Reports
// ==========================

db.collection("bugReports")
.orderBy("date","desc")
.get()
.then((snapshot)=>{

    const bugTable =
    document.getElementById("bugTable");

    bugTable.innerHTML = "";

    snapshot.forEach((doc)=>{

        const data = doc.data();

        let date = "";

        if(data.date){

            date = data.date.toDate().toLocaleString();

        }

     const status = data.status || "Open";

const badge =
status=="Fixed"
?
'<span style="background:green;color:white;padding:5px 10px;border-radius:20px;">🟢 Fixed</span>'
:
'<span style="background:orange;color:white;padding:5px 10px;border-radius:20px;">🟠 Open</span>';

bugTable.innerHTML += `

<tr>

<td>${data.name}</td>

<td>${data.email}</td>

<td>${data.message}</td>

<td>${badge}</td>

<td>${date}</td>

<td>

<button
onclick="markFixed('${doc.id}')"
style="background:#28a745;color:white;border:none;padding:7px 12px;border-radius:6px;cursor:pointer;">

✔ Fixed

</button>

<button
onclick="deleteBug('${doc.id}')"
style="background:#dc3545;color:white;border:none;padding:7px 12px;border-radius:6px;cursor:pointer;margin-left:8px;">

🗑 Delete

</button>

</td>

</tr>

`;

    });

})

function logout(){

auth.signOut().then(()=>{

window.location.href="login.html";

});

}

</script>

</body>
</html>
