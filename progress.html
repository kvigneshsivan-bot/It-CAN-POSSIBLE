<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBoost Progress</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
padding:20px;
}

h1{
color:#0A1F44;
margin-bottom:20px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card h2{
color:#65cd5e;
margin-bottom:10px;
}

.topic-progress{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.topic{
margin-bottom:20px;
}

.progress{
height:12px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-top:8px;
}

.progress-bar{
height:100%;
background:#11c426;
width:0%;
}

.accuracy{
margin-top:5px;
font-size:14px;
color:#555;
}
/* ===========================
   Responsive Design
=========================== */

@media (max-width:768px){

body{

padding:15px;

}

h1{

font-size:28px;
text-align:center;

}

.stats{

grid-template-columns:1fr;
gap:15px;

}

.card{

padding:18px;

}

.card h2{

font-size:26px;

}

.topic-progress{

padding:18px;

}

.topic{

margin-bottom:25px;

}

.topic h3{

font-size:22px;

}

.progress{

height:10px;

}

.accuracy{

font-size:15px;
line-height:1.6;

}

}


</style>
</head>
<body>

<h1>📊 My Progress</h1>

<div class="stats">

<div class="card">
<h2 id="totalTopics">24</h2>
<p>Total Topics</p>
</div>

<div class="card">
<h2 id="completedTopics">0</h2>
<p>Completed Topics</p>
</div>

<div class="card">
<h2 id="ongoingTopics">0</h2>
<p>Ongoing Topics</p>
</div>

<div class="card">
<h2 id="certificates">0</h2>
<p>Certificates Earned</p>
</div>

</div>

<div class="topic-progress">

<h2>Topic Progress</h2>

<div id="topicContainer"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>

<script>

auth.onAuthStateChanged(function(user){

    if(!user){

        window.location.href = "login.html";
        return;

    }

    db.collection("progress")
    .doc(user.uid)
    .get()
    .then((doc)=>{

        if(!doc.exists){

            document.getElementById("completedTopics").innerText = 0;
            document.getElementById("ongoingTopics").innerText = 0;
            document.getElementById("certificates").innerText = 0;

            document.getElementById("topicContainer").innerHTML =
            "<p>No progress available.</p>";

            return;

        }

        const progress = doc.data();

        const topicContainer =
        document.getElementById("topicContainer");

        topicContainer.innerHTML = "";

        let completed = 0;
        let ongoing = 0;

        for(let topic in progress){

            const accuracy =
            Number(progress[topic].accuracy || 0);

            const currentRound =
            Number(progress[topic].currentRound || 1);

            if(currentRound > 10){

                completed++;

            }else{

                ongoing++;

            }

            topicContainer.innerHTML += `

            <div class="topic">

                <h3>${topic}</h3>

                <div class="progress">

                    <div
                    class="progress-bar"
                    style="width:${accuracy}%">

                    </div>

                </div>

                <div class="accuracy">

                    Round :
                    ${Math.min(currentRound-1,10)} / 10

                    <br>

                    Accuracy :
                    ${accuracy}%

                </div>

            </div>

            `;

        }

        document.getElementById("completedTopics").innerText =
        completed;

        document.getElementById("ongoingTopics").innerText =
        ongoing;

        document.getElementById("certificates").innerText =
        completed;

    });

});

</script>

</body>
</html>
