<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBoost Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.profile-container{
background:white;
width:100%;
max-width:700px;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
color:#0A1F44;
text-align:center;
margin-bottom:20px;
}

.profile-pic{
text-align:center;
margin-bottom:20px;
}

.profile-pic img{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
border:4px solid #FF6B00;
}

.profile-pic input{
margin-top:10px;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:20px;
}

.card{
background:#f8f8f8;
padding:15px;
border-radius:10px;
text-align:center;
}

.card h2{
color:#FF6B00;
}

.btn{
width:100%;
padding:12px;
border:none;
background:#FF6B00;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.btn:hover{
opacity:.9;
}

.logout{
background:#dc3545;
}

</style>
</head>
<body>

<div class="profile-container">

<h1>👤 My Profile</h1>

<div class="profile-pic">

<img
id="profileImage"
src="https://via.placeholder.com/150">

<br>

<input
type="file"
id="uploadImage"
accept="image/*">

</div>

<div class="form-group">
<label>Full Name</label>
<input
type="text"
id="name">
</div>

<div class="form-group">
<label>Email</label>
<input
type="email"
id="email"
readonly>
</div>

<div class="form-group">
<label>New Password</label>
<input
type="password"
id="password"
placeholder="Enter new password">
</div>

<button
class="btn"
onclick="saveProfile()">
Save Profile
</button>

<div class="stats">

<div class="card">
<h2 id="completedTopics">0</h2>
<p>Completed Topics</p>
</div>

<div class="card">
<h2 id="certificates">0</h2>
<p>Certificates</p>
</div>

</div>

<button
class="btn logout"
onclick="logout()">
Logout
</button>

</div>

<script>

const user =
JSON.parse(
localStorage.getItem("brainboostUser")
) || {};

document.getElementById("name").value =
user.name || "";

document.getElementById("email").value =
user.email || "";

if(user.image){

document.getElementById("profileImage")
.src = user.image;

}

document.getElementById("uploadImage")
.addEventListener("change",function(){

const file = this.files[0];

const reader = new FileReader();

reader.onload = function(e){

document.getElementById("profileImage")
.src = e.target.result;

};

reader.readAsDataURL(file);

});

function saveProfile(){

let user =
JSON.parse(localStorage.getItem("brainboostUser")) || {};

user.name =
document.getElementById("name").value.trim();

user.email =
document.getElementById("email").value;

if(document.getElementById("password").value.trim()!=""){

user.password =
document.getElementById("password").value.trim();

}

user.image =
document.getElementById("profileImage").src;

localStorage.setItem(
"brainboostUser",
JSON.stringify(user)
);

alert("✅ Profile Updated Successfully");

}

let progress =
JSON.parse(
localStorage.getItem("progress")
) || {};

let completed = 0;

for(let topic in progress){

if(progress[topic].currentRound > 10){

completed++;

}

}

document.getElementById("completedTopics").innerText =
completed;

document.getElementById("certificates").innerText =
completed;

function logout(){

localStorage.removeItem("loggedIn");

window.location.href =
"login.html";

}

</script>

<script src="js/app.js"></script>


</body>

</html>
