<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBoost Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.profile-container{
background:white;
width:100%;
max-width:700px;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
color:#0A1F44;
text-align:center;
margin-bottom:20px;
}

.profile-pic{
text-align:center;
margin-bottom:20px;
}

.profile-pic img{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
border:4px solid #FF6B00;
}

.profile-pic input{
margin-top:10px;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:20px;
}

.card{
background:#f8f8f8;
padding:15px;
border-radius:10px;
text-align:center;
}

.card h2{
color:#FF6B00;
}

.btn{
width:100%;
padding:12px;
border:none;
background:#FF6B00;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.btn:hover{
opacity:.9;
}

.logout{
background:#dc3545;
}
/* ===========================
   Responsive Design
=========================== */

@media (max-width:768px){

body{

padding:15px;

}

.profile-container{

width:100%;
padding:20px;

}

h1{

font-size:28px;

}

.profile-pic img{

width:120px;
height:120px;

}

input{

font-size:16px;
padding:12px;

}

.stats{

grid-template-columns:1fr;
gap:15px;

}

.card{

padding:18px;

}

.btn{

width:100%;
padding:14px;
font-size:16px;

}

}

</style>
</head>
<body>

<div class="profile-container">

<h1>👤 My Profile</h1>

<div class="profile-pic">

<img
id="profileImage"
src="images/user.png">

<br>

<input
type="file"
id="uploadImage"
accept="image/*">

</div>

<div class="form-group">
<label>Full Name</label>
<input
type="text"
id="name">
</div>

<div class="form-group">
<label>Email</label>
<input
type="email"
id="email"
readonly>
</div>



<button
class="btn"
onclick="saveProfile()">
Save Profile
</button>

<div class="stats">

<div class="card">
<h2 id="completedTopics">0</h2>
<p>Completed Topics</p>
</div>

<div class="card">
<h2 id="certificates">0</h2>
<p>Certificates</p>
</div>

</div>

<button
class="btn logout"
onclick="logout()">
Logout
</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>

<script>


auth.onAuthStateChanged(function(user){

    if(!user){
        window.location.href = "login.html";
        return;
    }

    document.getElementById("email").value = user.email;

    db.collection("users")
    .doc(user.uid)
    .get()
    .then((doc)=>{

        if(doc.exists){

            const data = doc.data();

            document.getElementById("name").value = data.name || "";

            if(data.image){
                document.getElementById("profileImage").src = data.image;
            }

        }

    });

});

document.getElementById("uploadImage")
.addEventListener("change",function(){

const file = this.files[0];

const reader = new FileReader();

reader.onload = function(e){

document.getElementById("profileImage")
.src = e.target.result;

};

reader.readAsDataURL(file);

});

function saveProfile(){

    const user = auth.currentUser;

    if(!user) return;

    const name = document.getElementById("name").value.trim();
    const image = document.getElementById("profileImage").src;

    db.collection("users")
    .doc(user.uid)
    .update({

        name: name,
        image: image

    })
    .then(()=>{

        alert("✅ Profile Updated Successfully");

    })
    .catch((error)=>{

        alert(error.message);

    });

}
auth.onAuthStateChanged(function(user){

    if(!user) return;

    db.collection("progress")
    .doc(user.uid)
    .get()
    .then((doc)=>{

        if(!doc.exists) return;

        const progress = doc.data();

        let completed = 0;

        for(let topic in progress){

            if(progress[topic].currentRound > 10){

                completed++;

            }

        }

        document.getElementById("completedTopics").innerText = completed;
        document.getElementById("certificates").innerText = completed;

    });

});


function logout(){

auth.signOut().then(()=>{

window.location.href="login.html";

});

}



</script>




</body>

</html>
