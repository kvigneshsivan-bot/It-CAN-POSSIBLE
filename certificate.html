<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBoost Certificate</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
padding:30px;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.certificate{
width:1000px;
max-width:100%;
background:white;
padding:50px;
border:10px solid #0A1F44;
border-radius:20px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.logo{
font-size:40px;
font-weight:bold;
color:#FF6B00;
margin-bottom:20px;
}

.title{
font-size:36px;
color:#0A1F44;
margin-bottom:20px;
}

.name{
font-size:32px;
font-weight:bold;
color:#FF6B00;
margin:20px 0;
}

.topic{
font-size:24px;
margin:15px 0;
}

.date{
margin-top:20px;
}

.signature{
margin-top:50px;
display:flex;
justify-content:space-between;
}

.btn{
margin-top:30px;
padding:12px 20px;
border:none;
background:#FF6B00;
color:white;
border-radius:8px;
cursor:pointer;
}

.btn:hover{
opacity:.9;
}

</style>
</head>
<body>

<div class="certificate" id="certificate">

<div class="logo">
🧠 BrainBoost
</div>

<div class="title">
Certificate of Completion
</div>

<p>This certificate is proudly presented to</p>

<div class="name" id="studentName">
Student Name
</div>

<p>for successfully completing</p>

<div class="topic" id="topicName">
Topic Name
</div>

<p>with outstanding performance and dedication.</p>

<div class="date" id="completionDate">
Date
</div>

<div class="signature">

<div>
___________________
<br>
Trainer
</div>

<div>
___________________
<br>
BrainBoost
</div>

</div>

<button class="btn" onclick="window.print()">
🖨 Print Certificate
</button>

</div>

<script>

const user =
JSON.parse(
localStorage.getItem("brainboostUser")
) || {};

const topic =
localStorage.getItem("completedTopic")
|| "Number System";

document.getElementById("studentName")
.innerText =
user.name || "Student";

document.getElementById("topicName")
.innerText =
topic;

document.getElementById("completionDate")
.innerText =
"Completed on : " +
new Date().toLocaleDateString();

</script>
<script src="js/app.js"></script>


</body>

</html>
