<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BrainBoost Rounds</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f7fa;
padding:30px;
margin:0;
}

h1{
text-align:center;
color:#0A1F44;
margin-bottom:30px;
font-size:36px;
}

.round-card{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
margin-bottom:18px;
background:white;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
transition:.3s;
}

.round-card:hover{
transform:translateY(-3px);
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

button{
background:#FF6B00;
color:white;
border:none;
padding:12px 25px;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#0A1F44;
}

.back-btn{
background:#0A1F44;
margin-bottom:20px;
}

.back-btn:hover{
background:#FF6B00;
}

.tick{
font-size:25px;
color:green;
font-weight:bold;
}

.lock{
font-size:20px;
color:#777;
}
/* ===========================
   Responsive Design
=========================== */

@media (max-width:768px){

body{

padding:15px;

}

.container{

width:100%;
padding:20px;

}

h1{

font-size:28px;
text-align:center;

}

h2{

font-size:22px;
text-align:center;

}

.question{

font-size:20px;
line-height:1.5;

}

.options{

display:flex;
flex-direction:column;
gap:12px;

}

.option-btn{

width:100%;
padding:15px;
font-size:16px;

}

.navigation{

display:flex;
flex-direction:column;
gap:12px;

}

.navigation button{

width:100%;
padding:14px;
font-size:16px;

}

.timer{

font-size:22px;
text-align:center;

}

.progress{

width:100%;

}

}

</style>

</head>

<body>

<button class="back-btn"
onclick="window.location.href='topics.html'">
⬅ Back
</button>

<h1 id="topicTitle"></h1>

<div id="roundContainer"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>

<script>

// Selected Topic
const topic =
localStorage.getItem("selectedTopic");

// Check Topic
if(!topic){

alert("Please select a topic first.");

window.location.href="topics.html";

}

// Heading
document.getElementById("topicTitle").innerText =
topic + " Rounds";

let currentRound = 1;

auth.onAuthStateChanged(function(user){

    if(!user){

        window.location.href = "login.html";
        return;

    }

    db.collection("progress")
    .doc(user.uid)
    .get()
    .then((doc)=>{

        if(doc.exists){
window.progress = doc.data();
const progress = window.progress;
            

            if(progress[topic]){

                currentRound = progress[topic].currentRound || 1;

            }

        }

        if(currentRound > 10){

            currentRound = 10;

        }

        loadRounds();

    });

});

function loadRounds(){

const container = document.getElementById("roundContainer");
container.innerHTML = "";

const progress = window.progress || {};

for(let i=1;i<=10;i++){

let html = "";

if(i < currentRound){

const roundData = progress?.[topic]?.["round"+i] || {};

html = `
<div class="round-card">

<div>
<h3>Round ${i}</h3>

<div class="tick">✔ Completed</div>

<p>Score : ${roundData.score || 0}/5</p>

<p>Accuracy : ${roundData.accuracy || 0}%</p>

</div>

</div>
`;

}
else if(i === currentRound){

html = `
<div class="round-card">

<h3>Round ${i}</h3>

<button onclick="startRound(${i})">
Start
</button>

</div>
`;

}
else{

html = `
<div class="round-card">

<h3>Round ${i}</h3>

<div class="lock">
🔒 Locked
</div>

</div>
`;

}

container.innerHTML += html;

}

}

// Start Round
function startRound(round){

if(round > 10){

alert("All rounds completed.");

return;

}

localStorage.setItem(
"currentRound",
"round"+round
);

window.location.href =
"questions.html";

}

</script>

</body>
</html>
