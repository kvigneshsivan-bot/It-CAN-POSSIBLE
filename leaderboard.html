<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BrainBoost Leaderboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
padding:40px;
}

h1{
text-align:center;
color:#0A1F44;
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

th{
background:#0A1F44;
color:white;
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid #ddd;
}

tbody tr:hover{
background:#f8f8f8;
}

.back{
display:inline-block;
margin-bottom:20px;
padding:10px 20px;
background:#FF6B00;
color:white;
text-decoration:none;
border-radius:8px;
}

.back:hover{
background:#0A1F44;
}
/* ===========================
   Responsive Design
=========================== */

@media (max-width:768px){

body{

padding:15px;

}

h1{

font-size:28px;
text-align:center;

}

.back{

display:block;
width:fit-content;
margin-bottom:20px;

}

table{

display:block;
overflow-x:auto;
white-space:nowrap;

}

th,
td{

padding:12px;
font-size:15px;

}

}


</style>

</head>

<body>

<a href="topics.html" class="back">⬅ Back</a>

<h1>🏆 BrainBoost Leaderboard</h1>

<table>

<thead>

<tr>

<th>Rank</th>
<th>Name</th>
<th>Topic</th>
<th>Score</th>
<th>Accuracy</th>

</tr>

</thead>

<tbody id="leaderboardBody">

</tbody>

</table>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>

<script>

const table = document.getElementById("leaderboardBody");

db.collection("progress")
.get()
.then((snapshot)=>{

let leaderboard=[];

snapshot.forEach((doc)=>{

const user = doc.data();

for(let topic in user){

if(typeof user[topic] === "object"){

leaderboard.push({

name:user.name || "Student",

topic:topic,

score:user[topic].score || 0,

accuracy:user[topic].accuracy || 0

});

}

}

});

// Highest accuracy first
leaderboard.sort((a,b)=>b.accuracy-a.accuracy);

leaderboard.forEach((data,index)=>{

let medal=index+1;

if(index===0){

medal="🥇";

}
else if(index===1){

medal="🥈";

}
else if(index===2){

medal="🥉";

}

table.innerHTML+=`

<tr>

<td>${medal}</td>

<td>${data.name}</td>

<td>${data.topic}</td>

<td>${data.score}</td>

<td>${data.accuracy}%</td>

</tr>

`;

});

})
.catch((error)=>{

console.log(error);

});

</script>

</body>
</html>
