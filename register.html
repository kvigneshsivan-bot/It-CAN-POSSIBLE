<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBoost Register</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f5f7fa;
}

.container{
width:400px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo h1{
color:#0A1F44;
}

.logo span{
color:#FF6B00;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
border:none;
background:#FF6B00;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

p{
margin-top:15px;
text-align:center;
}

a{
color:#0A1F44;
font-weight:bold;
text-decoration:none;
}

.profile-preview{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
display:block;
margin:10px auto;
border:2px solid #ddd;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<h1>BRAIN<span>BOOST</span></h1>
<p>Create Your Account</p>
</div>

<img
id="preview"
class="profile-preview"
src="images/user.png">

<input
type="file"
id="profilePic"
accept="image/*">

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">

<button  id ="registerBtn" onclick="registerUser()">
Create Account
</button>

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

<script>

document
.getElementById("profilePic")
.addEventListener("change",function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){

document
.getElementById("preview")
.src=e.target.result;

};

reader.readAsDataURL(file);

}

});

function registerUser(){

const btn = document.getElementById("registerBtn");

let name=document.getElementById("name").value.trim();

let email=document.getElementById("email").value.trim();

let password=document.getElementById("password").value;

let confirmPassword=document.getElementById("confirmPassword").value;

let profile=document.getElementById("preview").src;

if(name==="" || email==="" || password===""){

alert("Please fill all fields");

return;

}

const emailPattern=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!emailPattern.test(email)){

alert("Enter valid email");

return;

}

if(password.length<6){

alert("Password must contain at least 6 characters");

return;

}

if(password!==confirmPassword){

alert("Passwords do not match");

return;

}
btn.disabled = true;
btn.innerText = "Creating Account...";

auth.createUserWithEmailAndPassword(email,password)

.then((userCredential)=>{

const user=userCredential.user;

db.collection("users").doc(user.uid).set({

uid:user.uid,

name:name,

email:email,

image:profile,

role:"user",

createdAt:new Date()

})

.then(()=>{

btn.disabled = false;
btn.innerText = "Create Account";

alert("🎉 Account Successfully Created!\nஇப்போது Login செய்யுங்கள்.");

window.location.href="login.html";

});

})

.catch((error)=>{

btn.disabled = false;
btn.innerText = "Create Account";

let message = "";

switch(error.code){

case "auth/email-already-in-use":
message = "இந்த Email ஏற்கனவே பதிவு செய்யப்பட்டிருக்கிறது.";
break;

case "auth/invalid-email":
message = "சரியான Email முகவரியை உள்ளிடுங்கள்.";
break;

case "auth/weak-password":
message = "Password குறைந்தது 6 எழுத்துகள் இருக்க வேண்டும்.";
break;

case "auth/network-request-failed":
message = "Internet Connection இல்லை.";
break;

default:
message = "Registration தோல்வியடைந்தது. மீண்டும் முயற்சிக்கவும்.";

}

alert(message);

});

}

</script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="js/firebase-config.js"></script>

<script src="js/app.js"></script>

</body>
</html>
