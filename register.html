<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBoost Register</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f5f7fa;
}

.container{
width:400px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo h1{
color:#0A1F44;
}

.logo span{
color:#FF6B00;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
border:none;
background:#FF6B00;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

p{
margin-top:15px;
text-align:center;
}

a{
color:#0A1F44;
font-weight:bold;
text-decoration:none;
}

.profile-preview{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
display:block;
margin:10px auto;
border:2px solid #ddd;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<h1>BRAIN<span>BOOST</span></h1>
<p>Create Your Account</p>
</div>

<img
id="preview"
class="profile-preview"
src="https://via.placeholder.com/100">

<input
type="file"
id="profilePic"
accept="image/*">

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">

<button onclick="registerUser()">
Create Account
</button>

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

<script>

document
.getElementById("profilePic")
.addEventListener("change",function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){

document
.getElementById("preview")
.src=e.target.result;

};

reader.readAsDataURL(file);

}

});

function registerUser(){

let name =
document.getElementById("name").value.trim();

let email =
document.getElementById("email").value.trim();

let password =
document.getElementById("password").value;

let confirmPassword =
document.getElementById("confirmPassword").value;

let profile =
document.getElementById("preview").src;


// Check empty fields
if(name==="" || email==="" || password===""){

alert("Please fill all fields");
return;

}


// Email validation
const emailPattern =
/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!emailPattern.test(email)){

alert("Enter a valid email address");
return;

}


// Password length
if(password.length < 6){

alert("Password must contain at least 6 characters");
return;

}


// Confirm password
if(password !== confirmPassword){

alert("Passwords do not match");
return;

}


// Duplicate email check
const oldUser =
JSON.parse(localStorage.getItem("brainboostUser"));

if(oldUser && oldUser.email === email){

alert("Email already registered");
return;

}


// Save user
let user={

name:name,
email:email,
password:password,

image:profile,

topicsCompleted:[],
certificates:[],
accuracy:0

};

localStorage.setItem(
"brainboostUser",
JSON.stringify(user)
);

alert("Registration Successful");

window.location.href="login.html";

}

</script>

<script src="js/app.js"></script>


</body>
</html>
