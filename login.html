<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBoost Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f5f7fa;
}

.container{
width:400px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.1);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
border:none;
background:#0A1F44;
color:white;
border-radius:8px;
cursor:pointer;
}

.logo{
text-align:center;
margin-bottom:20px;
}

a{
text-decoration:none;
}
</style>

</head>
<body>

<div class="container">

<div class="logo">
<h1>BrainBoost</h1>
<p>Login to Continue</p>
</div>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button  id="loginBtn" onclick="loginUser()">
Login
</button>

<p style="margin-top:15px;">
Don't have an account?
<a href="register.html">Register</a>
</p>

</div>

<script>

function loginUser() {
    const btn = document.getElementById("loginBtn");

let email =
document.getElementById("email").value.trim();

let password =
document.getElementById("password").value.trim();

if(email==="" || password===""){

alert("Please enter Email and Password");

return;

}
btn.disabled = true;
btn.innerText = "Logging in...";

auth.signInWithEmailAndPassword(email,password)

.then((userCredential)=>{

localStorage.setItem("loggedIn","true");

localStorage.setItem("uid",userCredential.user.uid);

alert("✅ Login Successful");
btn.disabled = false;
btn.innerText = "Login";

window.location.href="index.html";

})

.catch((error)=>{

    btn.disabled = false;
    btn.innerText = "Login";

    let message = "";

    switch(error.code){

        case "auth/user-not-found":
            message = "இந்த Email-க்கு Account இல்லை.";
            break;

        case "auth/wrong-password":
            message = "Password தவறாக உள்ளது.";
            break;

        case "auth/invalid-email":
            message = "சரியான Email முகவரியை உள்ளிடுங்கள்.";
            break;

        case "auth/network-request-failed":
            message = "Internet Connection இல்லை.";
            break;

        case "auth/too-many-requests":
            message = "அதிக முயற்சிகள். சிறிது நேரம் கழித்து மீண்டும் முயற்சிக்கவும்.";
            break;

        default:
            message = "Login தோல்வியடைந்தது. மீண்டும் முயற்சிக்கவும்.";

    }

    alert(message);

});
}

</script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>


</body>
</html>
